<nav class="navbar">
  <div class="nav-brand">Pink Beauty</div>
  
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Products</a></li>
    <li><a href="#">Contact</a></li>
  </ul>

  <div class="nav-cart">
    🛒 Cart: {{ cart.length }} | ₱{{ cartTotal }}
  </div>
</nav>

<div class="products">
  <div class="product-card" *ngFor="let item of products">
    <h3>{{ item.name }}</h3>
    <p>Price: ₱{{ item.price }}</p>
    <button (click)="addToCart(item)">Add to Cart</button> 
  </div>
</div>
