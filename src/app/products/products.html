<header style="background: #1976d2; color: white; padding: 15px; display: flex; justify-content: space-between;">
  <h1>My Angular Shop</h1>
  <div class="cart-status">
    🛒 Cart: <strong>{{ cart.length }} items</strong> | Total: ₱{{ cartTotal }}
  </div>
</header>

<div class="products">
  <div class="product-card" *ngFor="let item of products">
    <h3>{{ item.name }}</h3>
    <p>Price: ₱{{ item.price }}</p>
    <button (click)="addToCart(item)">Add to Cart</button> 
  </div>
</div>

<div *ngIf="cart.length > 0" style="margin-top: 30px; padding: 20px; border-top: 2px solid #ccc;">
  <h3>Your Shopping Cart</h3>
  <ul>
    <li *ngFor="let cartItem of cart">
      {{ cartItem.name }} - ₱{{ cartItem.price }}
    </li>
  </ul>
  <button style="background: orange; color: white; padding: 10px;">Checkout</button>
</div>
